<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loan Documents</title>

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <!-- Optional Custom CSS -->
  <link rel="stylesheet" href="/css/all.css">
</head>

<body>

  <main class="container mt-5">

    <h2 class="mb-4">Upload Documents</h2>

    <form id="docForm" enctype="multipart/form-data" class="card p-4 shadow-sm">

      <div class="mb-3">
        <label for="id" class="form-label">ID Document (required)</label>
        <input type="file" id="id" name="id" class="form-control" required>
      </div>

      <div class="mb-3">
        <label for="bank_statement" class="form-label">Bank Statement</label>
        <input type="file" id="bank_statement" name="bank_statement" class="form-control">
      </div>

      <div class="mb-3">
        <label for="payslip" class="form-label">Payslip</label>
        <input type="file" id="payslip" name="payslip" class="form-control">
      </div>

      <button type="submit" class="btn btn-primary">
        Upload
      </button>

    </form>

  </main>

  <!-- Bootstrap JS (FIXED) -->
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
  </script>

</body>
</html>
