<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Borrower Dashboard</title>

  <!-- Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <!-- Existing CSS -->
  <link rel="stylesheet" href="../public/css/main.css">
  <link rel="stylesheet" href="../public/css/dashboard.css">
</head>
<body>

  <!-- HEADER -->
  <header class="d-flex justify-content-between align-items-center p-3 border-bottom bg-light">
    <h1 class="h4 mb-0">Borrower Dashboard</h1>
    <button type="button" id="logoutBtn" class="btn btn-outline-danger btn-sm">
      Logout
    </button>
  </header>

  <main class="container mt-4">

    <!-- PROFILE -->
    <section class="card mb-4 shadow-sm">
      <div class="card-body">
        <h2 class="h5 mb-3">My Profile</h2>
        <p><strong>Name:</strong> <span id="userName"></span></p>
        <p><strong>Email:</strong> <span id="userEmail"></span></p>
        <p><strong>Branch:</strong> <span id="userBranch"></span></p>
      </div>
    </section>

    <!-- LOANS -->
    <section class="card mb-4 shadow-sm">
      <div class="card-body">
        <h2 class="h5 mb-3">My Loans</h2>

        <div class="table-responsive">
          <table class="table table-bordered table-striped align-middle">
            <thead class="table-dark">
              <tr>
                <th>Loan ID</th>
                <th>Loan Amount</th>
                <th>Total Payable</th>
                <th>Remaining Balance</th>
                <th>Repayment (Months)</th>
                <th>Monthly Installment</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="loansTableBody">
              <tr>
                <td colspan="7" class="text-center">
                  Loading loans...
                </td>
              </tr>
            </tbody>
          </table>
        </div>

      </div>
    </section>

    <!-- ACTIONS -->
    <section class="card shadow-sm">
      <div class="card-body">
        <h2 class="h5 mb-3">Actions</h2>

        <ul class="list-group">
          <li class="list-group-item">
            <a href="apply-loan.html" class="text-decoration-none">
              Apply for a Loan
            </a>
          </li>
          <li class="list-group-item">
            <a href="loan-documents.html" class="text-decoration-none">
              Upload Loan Documents
            </a>
          </li>
          <li class="list-group-item">
            <a href="payments.html" class="text-decoration-none">
              Make a Payment
            </a>
          </li>
        </ul>
      </div>
    </section>

  </main>

  <!-- Bootstrap JS -->
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
  </script>

  <!-- Dashboard Logic -->
  <script src="../public/js/dashboard.js"></script>

</body>
</html>
