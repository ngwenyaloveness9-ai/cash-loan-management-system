<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reports</title>

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <!-- Chart.js (For Branch Revenue Pie Chart) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- ===== SYSTEM STYLES ===== -->
  <link rel="stylesheet" href="/public/css/main.css">
  <link rel="stylesheet" href="/public/css/dashboard.css">
  <link rel="stylesheet" href="/public/css/all.css">
</head>

<body>

  <main class="container-fluid py-4 px-4">

    <!-- ================= PAGE TITLE ================= -->
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2 class="fw-bold">Reports</h2>
    </div>

    <!-- ================= REPORT PERIOD ================= -->
    <section class="card shadow-sm mb-4 p-4">
      <div class="row g-3 align-items-end">

        <div class="col-md-4">
          <label for="reportPeriod" class="form-label fw-semibold">
            Select Report Period
          </label>
          <select id="reportPeriod" class="form-select">
            <option value="today">Today</option>
            <option value="weekly">Weekly</option>
            <option value="monthly">Monthly</option>
            <option value="yearly">Yearly</option>
            <option value="custom">Custom</option>
          </select>
        </div>

        <div class="col-md-3">
          <label for="fromDate" class="form-label fw-semibold">
            From Date
          </label>
          <input type="date" id="fromDate" class="form-control" disabled>
        </div>

        <div class="col-md-3">
          <label for="toDate" class="form-label fw-semibold">
            To Date
          </label>
          <input type="date" id="toDate" class="form-control" disabled>
        </div>

      </div>
    </section>

    <!-- ================= REPORT SELECTION ================= -->
    <section class="card shadow-sm mb-4 p-4">
      <div class="row g-3">
        <div class="col-md-6">
          <label for="reportSelect" class="form-label fw-semibold">
            Select Report
          </label>
          <select id="reportSelect" class="form-select">
            <option value="loans">Loans (Approved)</option>
            <option value="payments">Payments</option>
            <option value="branch-revenue">Branch Revenue</option>
            <option value="closed-loans">Closed Loans</option>
            <option value="pending-loans">Pending Loans</option>
            <option value="overdue-loans">Overdue Loans</option>
          </select>
        </div>
      </div>
    </section>

    <!-- ================= REPORT DISPLAY ================= -->
    <section class="card shadow-sm mb-4">
      <div class="card-body">

        <div id="reportContainer" class="py-4">
          <div class="text-center text-muted">
            Select a report and period to view data.
          </div>
        </div>

      </div>
    </section>

    <!-- ================= EXPORT BUTTON ================= -->
    <div class="d-flex justify-content-end">
      <button id="exportPdfBtn" class="btn btn-dark px-4">
        Export PDF
      </button>
    </div>

  </main>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- jsPDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <!-- Reports JS -->
  <script src="/public/js/reports.js"></script>

</body>
</html>
