<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <!-- Fixed CSS -->
  <link rel="stylesheet" href="/css/dashboard.css">
</head>

<body>
  <div class="app">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <h2>Cash Loan Management System</h2>

      <nav class="nav flex-column">
        <a class="nav-link" href="/borrower-dashboard">Dashboard</a>
        <a class="nav-link" href="/apply-loan">Loans</a>
        <a class="nav-link" href="/payments">Payments</a>
        <a class="nav-link active" href="/profile">Profile</a>
      </nav>
    </aside>

    <!-- MAIN -->
    <main class="main">

      <!-- TOPBAR -->
      <div class="topbar d-flex justify-content-between align-items-center">
        <h4 class="mb-0">My Profile</h4>
        <button id="logoutBtn" class="btn btn-outline-light btn-sm" type="button">Logout</button>
      </div>

      <!-- PROFILE CARD -->
      <div class="glass-card mt-4">
        <h5 class="mb-3">Profile Details</h5>

        <form id="profileForm">

          <div class="mb-3">
            <label for="full_name" class="form-label">Full Name</label>
            <input
              type="text"
              id="full_name"
              class="form-control"
              placeholder="Enter your full name"
              required
            />
          </div>

          <div class="mb-3">
            <label for="email" class="form-label">Email Address</label>
            <input
              type="email"
              id="email"
              class="form-control"
              placeholder="Enter your email"
              required
            />
          </div>

          <div class="mb-3">
            <label for="phone" class="form-label">Phone Number</label>
            <input
              type="tel"
              id="phone"
              class="form-control"
              placeholder="Enter your phone number"
            />
          </div>

          <button type="submit" class="btn btn-primary">
            Save Changes
          </button>

        </form>
      </div>

      <!-- PASSWORD RESET -->
      <div class="glass-card mt-4">
        <h5 class="mb-3">Reset Password</h5>

        <form id="passwordForm">

          <div class="mb-3">
            <label for="new_password" class="form-label">New Password</label>
            <input
              type="password"
              id="new_password"
              class="form-control"
              placeholder="Enter new password"
              required
            />
          </div>

          <div class="mb-3">
            <label for="confirm_password" class="form-label">Confirm Password</label>
            <input
              type="password"
              id="confirm_password"
              class="form-control"
              placeholder="Confirm new password"
              required
            />
          </div>

          <button type="submit" class="btn btn-warning">
            Reset Password
          </button>

        </form>
      </div>

      <!-- FOOTER -->
      <footer class="footer mt-4">
        &copy; 2026 Cash Loan Management System
      </footer>

    </main>
  </div>

  <!-- Bootstrap -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Fixed JS -->
  <script src="/js/profile.js"></script>
</body>
</html>
