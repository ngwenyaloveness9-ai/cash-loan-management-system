<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payments</title>

  <!-- ✅ Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <!-- ✅ Optional: your existing CSS if you want -->
  <!-- <link rel="stylesheet" href="../public/css/dashboard.css"> -->
</head>
<body>

  <!-- HEADER -->
  <header class="bg-success text-white p-3 d-flex justify-content-between align-items-center">
    <h1 class="h4 mb-0">Loan Payments</h1>
    <a href="borrower-dashboard.html" class="btn btn-light btn-sm">
      Dashboard
    </a>
  </header>

  <main class="container my-4">

    <!-- MAKE PAYMENT (Borrower) -->
    <section id="makePaymentSection" class="card mb-4 shadow-sm">
      <div class="card-body">
        <h2 class="h5 mb-3">Make a Payment</h2>

        <form id="paymentForm">

          <div class="mb-3">
            <label for="loan_id" class="form-label">Loan ID</label>
            <input
              type="number"
              id="loan_id"
              name="loan_id"
              class="form-control"
              required
            />
          </div>

          <div class="mb-3">
            <label for="amount" class="form-label">Payment Amount</label>
            <input
              type="number"
              id="amount"
              name="amount"
              class="form-control"
              required
              min="1"
            />
          </div>

          <button type="submit" class="btn btn-success">
            Submit Payment
          </button>

        </form>
      </div>
    </section>

    <!-- PAYMENT HISTORY -->
    <section class="card shadow-sm">
      <div class="card-body">
        <h2 class="h5 mb-3">Payment History</h2>

        <div class="table-responsive">
          <table class="table table-bordered table-striped align-middle">
            <thead class="table-dark">
              <tr>
                <th>Payment ID</th>
                <th>Loan ID</th>
                <th>Amount</th>
                <th>Date</th>
              </tr>
            </thead>
            <tbody id="paymentsTable">
              <!-- Loaded by payment.js -->
            </tbody>
          </table>
        </div>
      </div>
    </section>

  </main>

  <!-- ✅ Bootstrap JS -->
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
  </script>

  <!-- ✅ Existing JS -->
  <script src="../public/js/payment.js"></script>

</body>
</html>
