<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loan Payments</title>

  <!-- Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <link rel="stylesheet" href="/public/css/all.css">

  <!-- Custom CSS -->
  <style>
    .hidden-section {
      display: none;
    }
  </style>
</head>

<body>

<header class="bg-success text-white p-3 d-flex justify-content-between align-items-center">
  <h1 class="h4 mb-0">Loan Payments</h1>
  <a href="borrower-dashboard.html" class="btn btn-light btn-sm">
    Dashboard
  </a>
</header>

<main class="container my-4">

  <section id="makePaymentSection" class="card mb-4 shadow-sm">
    <div class="card-body">
      <h2 class="h5 mb-3">Make a Payment</h2>

      <form id="paymentForm">

        <!-- Loan ID -->
        <div class="mb-3">
          <label for="loan_id" class="form-label">Loan ID</label>
          <input type="number" id="loan_id" class="form-control" required />
        </div>

        <!-- Amount -->
        <div class="mb-3">
          <label for="amount" class="form-label">Payment Amount</label>
          <input type="number" id="amount" class="form-control" required min="1" />
        </div>

        <!-- Payment Method -->
        <div class="mb-3">
          <label for="payment_method" class="form-label">Payment Method</label>
          <select id="payment_method" class="form-select" required>
            <option value="">Select Method</option>
            <option value="card">Credit / Debit Card</option>
            <option value="payshap">PayShap</option>
            <option value="payfast">PayFast</option>
          </select>
        </div>

        <!-- CARD SECTION -->
        <div id="cardSection" class="hidden-section">

          <div class="mb-3">
            <label for="card_number" class="form-label">Card Number</label>
            <input type="text" id="card_number" class="form-control" maxlength="16">
          </div>

          <div class="row">
            <div class="col-md-6 mb-3">
              <label for="expiry" class="form-label">Expiry</label>
              <input type="text" id="expiry" class="form-control" placeholder="MM/YY">
            </div>
            <div class="col-md-6 mb-3">
              <label for="cvv" class="form-label">CVV</label>
              <input type="text" id="cvv" class="form-control" maxlength="4">
            </div>
          </div>

        </div>

        <!-- PAYSHAP SECTION -->
        <div id="payshapSection" class="hidden-section">
          <div class="mb-3">
            <label for="reference_number" class="form-label">PayShap Reference</label>
            <input type="text" id="reference_number" class="form-control">
          </div>
        </div>

        <button type="submit" class="btn btn-success w-100">
          Submit Payment
        </button>

      </form>
    </div>
  </section>

  <!-- PAYMENT HISTORY -->
  <section class="card shadow-sm">
    <div class="card-body">
      <h2 class="h5 mb-3">Payment History</h2>

      <div class="table-responsive">
        <table class="table table-bordered table-striped align-middle">
          <thead class="table-dark">
            <tr>
              <th>Payment ID</th>
              <th>Loan ID</th>
              <th>Amount</th>
              <th>Method</th>
              <th>Date</th>
              <th>Receipt</th> <!-- ✅ NEW COLUMN -->
            </tr>
          </thead>
          <tbody id="paymentsTable"></tbody>
        </table>
      </div>
    </div>
  </section>

</main>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- ✅ jsPDF (for receipt download) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<!-- Your JS -->
<script src="/public/js/payment.js"></script>

</body>
</html>
