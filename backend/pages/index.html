<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cash Loan Management System</title>

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <!-- Bootstrap Icons -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css"
    rel="stylesheet"
  >

  <!-- Fixed Custom CSS -->
  <link rel="stylesheet" href="/css/main.css">
</head>

<body>

  <!-- ================= HEADER ================= -->
  <header class="header bg-primary text-white py-3">
    <div class="container d-flex justify-content-between align-items-center">
      <h1 class="h4 mb-0">
        <i class="bi bi-cash-coin"></i> Cash Loan Management System
      </h1>
      <nav>
        <a href="/login" class="btn btn-outline-light me-2">Login</a>
        <a href="/register" class="btn btn-light text-primary">Register</a>
      </nav>
    </div>
  </header>

  <!-- ================= HERO SECTION ================= -->
  <section class="hero py-5 text-center">
    <div class="container">
      <h2 class="mb-3 text-success">
        Fast, Secure Loans Across Multiple Branches
      </h2>
      <p class="lead mb-4">
        Apply, track, and repay your loan online with confidence.
      </p>
      <a href="/register" class="btn btn-success btn-lg">
        <i class="bi bi-file-earmark-text"></i> Apply for a Loan
      </a>
    </div>
  </section>

  <!-- ================= FOOTER ================= -->
  <footer class="footer bg-dark text-white text-center py-3 mt-5">
    <p class="mb-0">&copy; 2025 Cash Loan Management System</p>
  </footer>

  <!-- Bootstrap JS -->
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
  </script>

</body>
</html>
