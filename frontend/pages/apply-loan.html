<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apply for Loan</title>

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <!-- Your CSS -->
  <link rel="stylesheet" href="../public/css/all.css">
</head>

<body>

  <header class="p-3 border-bottom bg-light">
    <div class="container d-flex justify-content-between align-items-center">
      <h1 class="h4 mb-0">Apply for a Loan</h1>
      <a href="borrower-dashboard.html" class="btn btn-secondary btn-sm">
        Back to Dashboard
      </a>
    </div>
  </header>

  <main class="container mt-4">
    <form id="applyLoanForm" enctype="multipart/form-data">

      <!-- ================= LOAN DETAILS ================= -->
      <fieldset class="mb-4">
        <legend class="h5">Loan Details</legend>

        <!-- BRANCH -->
        <div class="mb-3">
          <label for="branch_id" class="form-label">Select Branch</label>
          <select id="branch_id" name="branch_id" class="form-select" required>
            <option value="">-- Select Branch --</option>
          </select>
        </div>

        <!-- AMOUNT -->
        <div class="mb-3">
          <label for="loan_amount" class="form-label">Loan Amount</label>
          <input
            type="number"
            id="loan_amount"
            name="loan_amount"
            class="form-control"
            required
            min="1"
          />
        </div>

        <!-- PERIOD -->
        <div class="mb-3">
          <label for="repayment_period" class="form-label">
            Repayment Period (months)
          </label>
          <input
            type="number"
            id="repayment_period"
            name="repayment_period"
            class="form-control"
            required
            min="1"
          />
        </div>
      </fieldset>

      <!-- ================= DOCUMENT UPLOAD ================= -->
      <fieldset class="mb-4">
        <legend class="h5">Upload Supporting Documents</legend>

        <!-- ID (REQUIRED) -->
        <div class="mb-3">
          <label for="id" class="form-label">
            ID Document <span class="text-danger">*</span>
          </label>
          <input
            type="file"
            id="id"
            name="id"
            class="form-control"
            accept=".pdf,.jpg,.jpeg,.png"
            required
          />
        </div>

        <!-- BANK STATEMENT (REQUIRED) -->
        <div class="mb-3">
          <label for="bank_statement" class="form-label">
            Bank Statement <span class="text-danger">*</span>
          </label>
          <input
            type="file"
            id="bank_statement"
            name="bank_statement"
            class="form-control"
            accept=".pdf,.jpg,.jpeg,.png"
            required
          />
        </div>

        <!-- PAYSLIP (OPTIONAL) -->
        <div class="mb-3">
          <label for="payslip" class="form-label">
            Payslip (Optional)
          </label>
          <input
            type="file"
            id="payslip"
            name="payslip"
            class="form-control"
            accept=".pdf,.jpg,.jpeg,.png"
          />
        </div>

        <small class="text-muted">
          * ID document and bank statement are required. Payslip is optional.
        </small>
      </fieldset>

      <!-- SUBMIT -->
      <button type="submit" class="btn btn-primary">
        Submit Loan Application
      </button>

    </form>
  </main>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Loan JS -->
  <script src="../public/js/loan.js"></script>

</body>
</html>
