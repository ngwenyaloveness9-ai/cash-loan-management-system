<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loan Officer Dashboard</title>

  <!-- ✅ Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <!-- ✅ Existing CSS -->
  <link rel="stylesheet" href="../public/css/main.css">
  <link rel="stylesheet" href="../public/css/dashboard.css">
  <link rel="stylesheet" href="../public/css/admin.css">
</head>
<body>

  <!-- HEADER -->
  <header class="bg-primary text-white p-3 d-flex justify-content-between align-items-center">
    <h1 class="h4 mb-0">Loan Officer Dashboard</h1>
    <button
      type="button"
      id="logoutBtn"
      class="btn btn-light btn-sm"
      aria-label="Logout"
      title="Logout">
      Logout
    </button>
  </header>

  <main class="container my-4">

    <!-- OFFICER INFO -->
    <section aria-labelledby="officer-info-heading" class="card mb-4 shadow-sm">
      <div class="card-body">
        <h2 id="officer-info-heading" class="h5 mb-3">Officer Profile</h2>
        <p><strong>Name:</strong> <span id="officerName"></span></p>
        <p><strong>Email:</strong> <span id="officerEmail"></span></p>
        <p><strong>Branch:</strong> <span id="officerBranch"></span></p>
        <p><strong>Role:</strong> <span id="officerRole"></span></p>
      </div>
    </section>

    <!-- LOAN APPLICATIONS -->
    <section aria-labelledby="loan-applications-heading" class="card mb-4 shadow-sm">
      <div class="card-body">
        <h2 id="loan-applications-heading" class="h5 mb-3">Loan Applications</h2>

        <div class="table-responsive">
          <table class="table table-bordered table-striped align-middle">
            <thead class="table-dark">
              <tr>
                <th scope="col">Loan ID</th>
                <th scope="col">Borrower</th>
                <th scope="col">Amount</th>
                <th scope="col">Branch</th>
                <th scope="col">Status</th>
                <th scope="col">Action</th>
              </tr>
            </thead>
            <tbody id="applicationsTableBody">
              <tr>
                <td colspan="6" class="text-center">Loading applications...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </section>

    <!-- NAVIGATION -->
    <section aria-labelledby="officer-actions-heading" class="card shadow-sm">
      <div class="card-body">
        <h2 id="officer-actions-heading" class="h5 mb-3">Management</h2>

        <ul class="list-group">
          <li class="list-group-item">
            <a href="payments.html" class="text-decoration-none">Record Payments</a>
          </li>
          <li class="list-group-item">
            <a href="reports.html" class="text-decoration-none">View Reports</a>
          </li>
          <li class="list-group-item">
            <a href="branches.html" class="text-decoration-none">Manage Branches</a>
          </li>
        </ul>
      </div>
    </section>

  </main>

  <!-- ================= VIEW DOCUMENTS MODAL ================= -->
  <div class="modal fade" id="documentsModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
      <div class="modal-content">

        <div class="modal-header">
          <h5 class="modal-title">Loan Documents</h5>
          <button
            type="button"
            class="btn-close"
            data-bs-dismiss="modal"
            aria-label="Close documents modal"
            title="Close">
          </button>
        </div>

        <div class="modal-body">
          <div id="documentsList">
            <p class="text-muted">Loading documents...</p>
          </div>
        </div>

        <div class="modal-footer">
          <button
            type="button"
            class="btn btn-secondary"
            data-bs-dismiss="modal"
            aria-label="Close modal"
            title="Close">
            Close
          </button>
        </div>

      </div>
    </div>
  </div>

  <!-- ✅ Bootstrap JS -->
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
  </script>

  <!-- ✅ Dashboard JS -->
  <script src="../public/js/dashboard.js"></script>
</body>
</html>
