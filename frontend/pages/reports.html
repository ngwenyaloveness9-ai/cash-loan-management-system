<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reports</title>

  <!-- ✅ Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >
</head>

<body>

  <!-- HEADER -->
  <header class="bg-primary text-white p-3 mb-4">
    <div class="container">
      <h1 class="h4 mb-0">Reports</h1>
    </div>
  </header>

  <main class="container">

    <!-- ================= FILTER FORM ================= -->
    <section class="card mb-4 shadow-sm">
      <div class="card-body">
        <h2 class="h5 mb-3">Generate Report</h2>

        <form id="filterForm" class="row g-3">

          <div class="col-md-4">
            <label for="fromDate" class="form-label">From Date</label>
            <input
              type="date"
              id="fromDate"
              name="fromDate"
              class="form-control"
              required
            />
          </div>

          <div class="col-md-4">
            <label for="toDate" class="form-label">To Date</label>
            <input
              type="date"
              id="toDate"
              name="toDate"
              class="form-control"
              required
            />
          </div>

          <div class="col-md-4 d-flex align-items-end gap-2">
            <button type="submit" class="btn btn-primary">
              Generate Report
            </button>
            <button
              type="button"
              id="exportPdfBtn"
              class="btn btn-outline-secondary"
            >
              Export PDF
            </button>
          </div>

        </form>
      </div>
    </section>

    <!-- ================= SUMMARY ================= -->
    <section class="card mb-4 shadow-sm">
      <div class="card-body">
        <h2 class="h5 mb-3">Summary</h2>
        <ul id="summaryList" class="list-group">
          <!-- Filled by reports.js -->
        </ul>
      </div>
    </section>

    <!-- ================= BRANCH REVENUE ================= -->
    <section class="card mb-4 shadow-sm">
      <div class="card-body">
        <h2 class="h5 mb-3">Branch Revenue</h2>

        <div class="table-responsive">
          <table class="table table-bordered table-striped align-middle">
            <thead class="table-dark">
              <tr>
                <th>Branch</th>
                <th>Total Loans</th>
                <th>Revenue</th>
              </tr>
            </thead>
            <tbody id="branchRevenueTable">
              <!-- Filled by reports.js -->
            </tbody>
          </table>
        </div>
      </div>
    </section>

    <!-- ================= CLOSED LOANS ================= -->
    <section class="card mb-4 shadow-sm">
      <div class="card-body">
        <h2 class="h5 mb-3">Closed Loans</h2>

        <div class="table-responsive">
          <table class="table table-bordered table-striped align-middle">
            <thead class="table-dark">
              <tr>
                <th>Loan ID</th>
                <th>Borrower</th>
                <th>Branch</th>
                <th>Amount</th>
              </tr>
            </thead>
            <tbody id="closedLoansTable">
              <!-- Filled by reports.js -->
            </tbody>
          </table>
        </div>
      </div>
    </section>

  </main>

  <!-- ✅ Bootstrap JS -->
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
  </script>

  <!-- ✅ Existing JS -->
  <script src="../public/js/reports.js"></script>

</body>
</html>
